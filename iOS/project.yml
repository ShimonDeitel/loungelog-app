name: Loungelog
options:
  bundleIdPrefix: com.shimondeitel.loungelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Loungelog:
    type: application
    platform: iOS
    sources:
      - path: Loungelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.loungelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Loungelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LoungelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LoungelogTests
      - path: Loungelog.storekit
    dependencies:
      - target: Loungelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.loungelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LoungelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LoungelogUITests
    dependencies:
      - target: Loungelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.loungelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Loungelog:
    build:
      targets:
        Loungelog: all
        LoungelogTests: [test]
        LoungelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Loungelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Loungelog.storekit
      targets:
        - LoungelogTests
        - LoungelogUITests
    archive:
      config: Release
